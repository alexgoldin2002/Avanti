<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap"
    rel="stylesheet"
  />
  <style>
    @page {
      size: letter;
      margin: 0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: #ffffff;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 11in;
    }

    .logo-wrap {
      display: inline-block;
      position: relative;
    }

    .logo-box {
      clip-path: polygon(4% 0%, 100% 0%, 96% 100%, 0% 100%);
      border: 1px solid #2d6a4f;
      padding: 12px 40px;
      display: inline-block;
    }

    .logo-text {
      font-size: 40px;
      font-weight: 300;
      letter-spacing: 0.3em;
      color: #2d6a4f;
      font-family: 'Cormorant Garamond', Georgia, serif;
      text-transform: uppercase;
      font-style: oblique;
      line-height: 1;
      display: block;
    }
  </style>
</head>
<body>
  <div class="logo-wrap">
    <div class="logo-box">
      <span class="logo-text">AVANTI</span>
    </div>
  </div>
</body>
</html>
